name: CI

# Thin caller — all logic lives in the shared reusable workflow.
# See https://github.com/avocado-linux/actions
on:
  pull_request:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read
  id-token: write   # keyless publish to connect on tags (GitHub OIDC)

jobs:
  ci:
    uses: avocado-linux/actions/.github/workflows/extension.yml@v1
    # All inputs optional; the build target is auto-derived from avocado.yaml.
